pre-commit:
  parallel: true
  jobs:
    - name: format
      run: pnpm dlx oxfmt --no-error-on-unmatched-pattern --write {staged_files}
      glob: "*"
      stage_fixed: true

    - name: lint
      run: pnpm dlx oxlint --no-error-on-unmatched-pattern --fix {staged_files}
      glob: "*"
      stage_fixed: true
